<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Arms Workout</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #0ade83;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .workout-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--text-color);
            letter-spacing: 0.5px;
        }

        /* --- Visual Animation Demo --- */
        .demo-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .animation-track {
            width: 10px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            position: relative;
        }

        .animation-weight {
            width: 26px;
            height: 14px;
            background: var(--accent-color);
            border-radius: 4px;
            position: absolute;
            left: -8px;
            bottom: 0;
            animation: exerciseMove 3s ease-in-out infinite;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .animation-weight::before, .animation-weight::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 22px;
            background: var(--text-color);
            top: -4px;
            border-radius: 2px;
        }
        .animation-weight::before { left: -3px; }
        .animation-weight::after { right: -3px; }

        .tempo-text {
            font-size: 0.8rem;
            color: var(--accent-color);
            margin-top: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Exercise Details --- */
        .exercise-info {
            margin-bottom: 15px;
        }

        #exercise-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        #exercise-target {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* --- Progress Stats --- */
        .stats-row {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.15);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .stat-box span {
            display: block;
            font-weight: bold;
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        /* --- Timer Display --- */
        .timer-section {
            background: rgba(10, 222, 131, 0.1);
            border: 1px solid rgba(10, 222, 131, 0.2);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .timer-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent-color);
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        #timer-display {
            font-size: 2rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        /* --- Interactive Controls --- */
        .btn-group {
            display: flex;
            gap: 10px;
        }

        btn {
            display: inline-block;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent-color);
            color: #000;
        }

        .btn-primary:active {
            transform: scale(0.97);
            background: #09c474;
        }

        .btn-secondary {
            background: #334155;
            color: var(--text-color);
        }

        .btn-secondary:active {
            transform: scale(0.97);
            background: #475569;
        }

        /* --- Animations --- */
        @keyframes exerciseMove {
            0%, 100% { bottom: 0px; }
            50% { bottom: 56px; }
        }

        /* Utility disabled class */
        .disabled-anim {
            animation-play-state: paused !important;
        }
    </style>
</head>
<body>

    <div class="workout-container">
        <h1>Arms Elite Tracker</h1>
        
        <div class="demo-card">
            <div class="animation-track">
                <div id="visual-weight" class="animation-weight"></div>
            </div>
            <div id="tempo-label" class="tempo-text">Squeeze & Lift</div>
        </div>

        <div class="exercise-info">
            <div id="exercise-name">Bicep Curls</div>
            <div id="exercise-target">Target: 3 Sets x 12 Reps</div>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                Current Set
                <span id="current-set">1 / 3</span>
            </div>
            <div class="stat-box">
                Next Up
                <span id="next-exercise" style="font-size: 0.9rem; color: var(--text-muted); margin-top:3px;">Hammer Curls</span>
            </div>
        </div>

        <div class="timer-section">
            <div id="timer-title" class="timer-label">Form Focus</div>
            <div id="timer-display">Working</div>
        </div>

        <div class="btn-group">
            <button id="pause-btn" class="btn-secondary" onclick="togglePause()">Pause</button>
            <button id="action-btn" class="btn-primary" onclick="handleAction()">Complete Set</button>
        </div>
    </div>

    <script>
        // Workout Data Schema
        const workout = [
            { name: "Bicep Curls", sets: 3, target: "12 Reps", advice: "Squeeze & Lift" },
            { name: "Hammer Curls", sets: 3, target: "12 Reps", advice: "Hammer Up & Down" },
            { name: "Tricep Overhead Press", sets: 3, target: "15 Reps", advice: "Extend Overhead" },
            { name: "Diamond Push-Ups", sets: 3, target: "To Failure", advice: "Push From Core" }
        ];

        let currentIdx = 0;
        let currentSet = 1;
        let isResting = false;
        let isPaused = false;
        
        let timerCountdown = null;
        let secondsLeft = 0;

        const uiName = document.getElementById("exercise-name");
        const uiTarget = document.getElementById("exercise-target");
        const uiSet = document.getElementById("current-set");
        const uiNext = document.getElementById("next-exercise");
        const uiTimerTitle = document.getElementById("timer-title");
        const uiTimerDisplay = document.getElementById("timer-display");
        const uiActionBtn = document.getElementById("action-btn");
        const uiPauseBtn = document.getElementById("pause-btn");
        const uiWeight = document.getElementById("visual-weight");
        const uiTempo = document.getElementById("tempo-label");

        function updateUI() {
            const currentEx = workout[currentIdx];
            const nextEx = workout[currentIdx + 1];

            uiName.innerText = currentEx.name;
            uiTarget.innerText = `Target: ${currentEx.sets} Sets x ${currentEx.target}`;
            uiSet.innerText = `${currentSet} / ${currentEx.sets}`;
            uiNext.innerText = nextEx ? nextEx.name : "Workout Complete!";
            
            if (!isResting) {
                uiTimerTitle.innerText = "Form Focus";
                uiTimerDisplay.innerText = "Working";
                uiTimerDisplay.style.color = "var(--text-color)";
                uiActionBtn.innerText = "Complete Set";
                uiWeight.classList.remove("disabled-anim");
                uiTempo.innerText = currentEx.advice;
            }
        }

        function handleAction() {
            if (isPaused) return; // Ignore if paused

            const currentEx = workout[currentIdx];

            if (!isResting) {
                // Set completed -> start rest period
                isResting = true;
                secondsLeft = 45; // 45 seconds rest
                uiTimerTitle.innerText = "Rest Timer";
                uiTimerDisplay.style.color = "var(--accent-color)";
                uiActionBtn.innerText = "Skip Rest";
                
                // Pause visual form guide during rest
                uiWeight.classList.add("disabled-anim");
                uiTempo.innerText = "Catch Your Breath";

                startTimerLogic();
            } else {
                // Rest skipped or finished -> advance workout
                clearInterval(timerCountdown);
                isResting = false;
                
                if (currentSet < currentEx.sets) {
                    currentSet++;
                } else {
                    // Move to next exercise
                    if (currentIdx < workout.length - 1) {
                        currentIdx++;
                        currentSet = 1;
                    } else {
                        // Complete everything
                        alert("Incredible work! You smashed your arm workout.");
                        resetWorkout();
                        return;
                    }
                }
                updateUI();
            }
        }

        function startTimerLogic() {
            clearInterval(timerCountdown);
            uiTimerDisplay.innerText = formatTime(secondsLeft);

            timerCountdown = setInterval(() => {
                if (!isPaused) {
                    secondsLeft--;
                    uiTimerDisplay.innerText = formatTime(secondsLeft);

                    if (secondsLeft <= 0) {
                        clearInterval(timerCountdown);
                        handleAction(); // Trigger automatic transition back to work
                    }
                }
            }, 1000);
        }

        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                uiPauseBtn.innerText = "Resume";
                uiPauseBtn.style.background = "var(--accent-color)";
                uiPauseBtn.style.color = "#000";
                uiWeight.classList.add("disabled-anim");
                if (!isResting) {
                    uiTimerDisplay.innerText = "Paused";
                }
            } else {
                uiPauseBtn.innerText = "Pause";
                uiPauseBtn.style.background = "#334155";
                uiPauseBtn.style.color = "var(--text-color)";
                
                if (!isResting) {
                    uiWeight.classList.remove("disabled-anim");
                    uiTimerDisplay.innerText = "Working";
                } else {
                    uiWeight.classList.add("disabled-anim");
                }
            }
        }

        function formatTime(secs) {
            let m = Math.floor(secs / 60);
            let s = secs % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function resetWorkout() {
            currentIdx = 0;
            currentSet = 1;
            isResting = false;
            isPaused = false;
            clearInterval(timerCountdown);
            updateUI();
        }

        // Initialize App View
        updateUI();
    </script>
</body>
</html>
